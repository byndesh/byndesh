name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate database client
        run: pnpm run db:generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Build & Type Check
        run: pnpm turbo run build typecheck --filter=@beyndesh/web...
        env:
          NEXT_PUBLIC_SITE_URL: https://byndbd.com
          SKIP_ENV_VALIDATION: true
          KEYSTATIC_GITHUB_CLIENT_ID: "placeholder"
          KEYSTATIC_GITHUB_CLIENT_SECRET: "placeholder"
          KEYSTATIC_SECRET: "placeholder"

      - name: Lint
        run: pnpm run lint
        continue-on-error: true
